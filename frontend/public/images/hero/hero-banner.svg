<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-label="Ved Vigyan hero banner">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7efe3"/>
      <stop offset="1" stop-color="#fffaf0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#f28c28" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="14" flood-color="#1d1a14" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1400" height="520" rx="34" fill="url(#bg)"/>
  <rect x="0" y="0" width="1400" height="78" rx="34" fill="url(#accent)" opacity="0.55"/>

  <!-- Left product group -->
  <g transform="translate(120 130)" filter="url(#shadow)">
    <rect x="0" y="0" width="680" height="330" rx="28" fill="#ffffff" opacity="0.62"/>
    <g transform="translate(70 165)">
      <!-- mala ring -->
      <circle r="132" fill="none" stroke="#b07a45" stroke-width="18" opacity="0.22"/>
      <g fill="#b07a45" opacity="0.82">
        <circle cx="0" cy="-132" r="12"/><circle cx="64" cy="-116" r="12"/><circle cx="112" cy="-74" r="12"/>
        <circle cx="132" cy="-10" r="12"/><circle cx="118" cy="58" r="12"/><circle cx="74" cy="108" r="12"/>
        <circle cx="10" cy="132" r="12"/><circle cx="-58" cy="118" r="12"/><circle cx="-108" cy="76" r="12"/>
        <circle cx="-132" cy="12" r="12"/><circle cx="-120" cy="-56" r="12"/><circle cx="-78" cy="-108" r="12"/>
      </g>
    </g>

    <!-- Rudraksha bead -->
    <g transform="translate(390 176)">
      <circle r="98" fill="#8b5632" opacity="0.95"/>
      <path d="M0-92 C-10-60 -10-24 0 10 C10 44 10 66 0 92" fill="none" stroke="#331d12" stroke-width="6" opacity="0.45"/>
      <path d="M-34-86 C-56-40 -56-6 -34 28 C-22 52 -22 72 -34 88" fill="none" stroke="#331d12" stroke-width="5" opacity="0.30"/>
      <path d="M34-86 C56-40 56-6 34 28 C22 52 22 72 34 88" fill="none" stroke="#331d12" stroke-width="5" opacity="0.30"/>
      <circle r="7" fill="#1d1a14" opacity="0.18"/>
    </g>

    <!-- Bracelet -->
    <g transform="translate(560 230)" opacity="0.95">
      <circle r="78" fill="none" stroke="#6f3f25" stroke-width="16" opacity="0.20"/>
      <g fill="#8b5632" opacity="0.95">
        <circle cx="0" cy="-78" r="10"/><circle cx="38" cy="-66" r="10"/><circle cx="64" cy="-44" r="10"/>
        <circle cx="76" cy="-6" r="10"/><circle cx="66" cy="30" r="10"/><circle cx="44" cy="58" r="10"/>
        <circle cx="6" cy="76" r="10"/><circle cx="-30" cy="66" r="10"/><circle cx="-58" cy="44" r="10"/>
        <circle cx="-76" cy="8" r="10"/><circle cx="-66" cy="-30" r="10"/><circle cx="-44" cy="-58" r="10"/>
      </g>
    </g>
  </g>

  <!-- Right text block hint (kept minimal; real text is HTML) -->
  <g transform="translate(860 160)">
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="44" font-weight="700" fill="#3b2417" opacity="0.92">Your Daily Spiritual Shield</text>
    <text x="0" y="40" font-family="Segoe UI, Arial" font-size="18" font-weight="600" fill="#3b2417" opacity="0.70">Authentic Rudraksha " Mala " Gem Stones " Astrology</text>
    <rect x="0" y="70" width="240" height="54" rx="16" fill="#5b2a1e" opacity="0.88"/>
    <text x="26" y="106" font-family="Segoe UI, Arial" font-size="18" font-weight="800" fill="#fff">Shop Rudraksha ’</text>
  </g>
</svg>

